<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL // CASUAL STYLE</title>
    <style>
        body {
            background-color: #030303;
            color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 30px;
            font-size: 14px;
        }
        .header-center {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .header-center h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .tab-btn {
            cursor: pointer;
            color: #555;
            transition: 0.2s;
        }
        .tab-btn:hover {
            color: #aaa;
        }
        .tab-btn.active {
            color: #00ff00;
            font-weight: bold;
        }
        .cmd-line {
            margin-bottom: 20px;
        }
        .cmd-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            width: 300px;
            border-bottom: 1px solid #555;
        }
        .log-container {
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .log-line {
            margin-bottom: 4px;
        }
        .timestamp {
            color: #666;
        }
    </style>
</head>
<body>

    <div class="header-center">
        <h1>SECURE LOGS // CASUAL STYLE</h1>
        <div id="clock" style="color: #666;"></div>
    </div>

    <div class="nav-bar">
        <span onclick="setTab('all')" id="btn-all" class="tab-btn active">[ ALL EVENTS ]</span>
        <span onclick="setTab('report')" id="btn-report" class="tab-btn">[ REPORTS ]</span>
        <span id="btn-user" class="tab-btn" style="display: none;">[ FILTER ]</span>
    </div>

    <div class="cmd-line">
        <span>root@casual-style:~# search_target --user </span>
        <input type="text" id="search" class="cmd-input" placeholder="_" onkeydown="if(event.key === 'Enter') searchPlayer()">
    </div>

    <div id="logs-container" class="log-container"></div>

    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/twistedk1d/PlayersData/refs/heads/main/data.json';
        let allData = [];
        let currentTab = 'all';
        let currentUser = '';

        async function load() {
            try {
                const r = await fetch(`${DATA_URL}?v=${Date.now()}`);
                const data = await r.json();
                allData = Array.isArray(data) ? data.filter(i => i !== null) : [];
                render();
            } catch (e) {
                document.getElementById('logs-container').innerText = 'FATAL ERROR: UNABLE TO FETCH DATASTREAM';
            }
        }

        function setTab(t) {
            currentTab = t;
            document.getElementById('btn-all').className = t === 'all' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btn-report').className = t === 'report' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btn-user').className = t === 'user' ? 'tab-btn active' : 'tab-btn';
            
            if (t !== 'user') {
                document.getElementById('btn-user').style.display = 'none';
                currentUser = '';
                document.getElementById('search').value = '';
            }
            render();
        }

        function searchPlayer() {
            const val = document.getElementById('search').value.toLowerCase().trim();
            if (!val) {
                setTab('all');
                return;
            }
            currentUser = val;
            const btn = document.getElementById('btn-user');
            btn.innerText = `[ TARGET: ${val.toUpperCase()} ]`;
            btn.style.display = 'inline';
            setTab('user');
        }

        function render() {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';

            const filtered = allData.filter(item => {
                const type = (item.type || '').toLowerCase();
                if (currentTab === 'report' && type !== 'report') return false;
                if (currentTab === 'user') {
                    const u = (item.user || item.target || '').toLowerCase();
                    const s = (item.sender || '').toLowerCase();
                    return u.includes(currentUser) || s.includes(currentUser);
                }
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = 'root@casual-style:~# NO DATA FOUND FOR THIS QUERY';
                return;
            }

            filtered.forEach(item => {
                const ts = item.ts ? new Date(item.ts * 1000) : null;
                const timeStr = ts ? 
                    `${ts.getDate().toString().padStart(2, '0')}.${(ts.getMonth()+1).toString().padStart(2, '0')}.${ts.getFullYear()} ${ts.getHours().toString().padStart(2, '0')}:${ts.getMinutes().toString().padStart(2, '0')}:${ts.getSeconds().toString().padStart(2, '0')}` 
                    : (item.fullTime || '??.??.???? ??:??:??');
                
                const div = document.createElement('div');
                div.className = 'log-line';
                
                const color = item.color || (item.type === 'report' ? '#ff0033' : '#00ff00');
                const tType = (item.type || 'UNKNOWN').toUpperCase();
                
                if (tType === 'REPORT') {
                    div.innerHTML = `<span class="timestamp">[${timeStr}]</span> <span style="color: ${color}">[${tType}]</span> ${item.sender} -> ${item.user || item.target} :: REASON: "${item.reason}"`;
                } else {
                    div.innerHTML = `<span class="timestamp">[${timeStr}]</span> <span style="color: ${color}">[${tType}]</span> ${item.user} :: ${item.action || ''} :: ${item.details || ''}`;
                }
                
                container.appendChild(div);
            });
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = `SYS.TIME: ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
        }, 1000);
        
        setInterval(load, 30000);
        window.onload = load;
    </script>
</body>
</html>
