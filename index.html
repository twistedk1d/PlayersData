<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL // CASUAL STYLE</title>
    <style>
        body {
            background: #0a0a0a;
            color: #d1d1d1;
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #00ff41;
            font-size: 20px;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        .clock {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .nav-item {
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            color: #444;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .nav-item:hover { color: #888; }
        .nav-item.active { color: #00ff41; text-decoration: underline; }

        .search-box {
            max-width: 600px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
        }

        .search-box span { color: #00ff41; margin-right: 10px; }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #00ff41;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        #terminal {
            max-width: 1100px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .log-line {
            white-space: pre-wrap;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .ts { color: #555; margin-right: 10px; }
        .type { font-weight: bold; margin-right: 10px; }
        .user { color: #fff; }
        .details { color: #888; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SECURE LOGS // CASUAL STYLE</h1>
        <div class="clock" id="clock">SYSTEM READY</div>
    </div>

    <div class="nav">
        <div onclick="setTab('all')" id="tab-all" class="nav-item active">ALL EVENTS</div>
        <div onclick="setTab('report')" id="tab-report" class="nav-item">REPORTS</div>
        <div id="tab-user" class="nav-item" style="display:none">TARGET</div>
    </div>

    <div class="search-box">
        <span>root@casual-style:~$</span>
        <input type="text" id="search" placeholder="search_user..." onkeydown="if(event.key==='Enter') searchPlayer()">
    </div>

    <div id="terminal">
        <div class="log-line">Initializing secure connection...</div>
    </div>

    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/twistedk1d/PlayersData/refs/heads/main/data.json';
        let logs = [];
        let tab = 'all';
        let query = '';

        async function load() {
            try {
                const r = await fetch(`${DATA_URL}?v=${Date.now()}`);
                logs = await r.json();
                render();
            } catch (e) {
                document.getElementById('terminal').innerHTML = '<div style="color:red">CONNECTION ERROR</div>';
            }
        }

        function setTab(t) {
            tab = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + (t === 'user' ? 'user' : t)).classList.add('active');
            if(t !== 'user') {
                document.getElementById('tab-user').style.display = 'none';
                query = '';
            }
            render();
        }

        function searchPlayer() {
            const v = document.getElementById('search').value.toLowerCase().trim();
            if(!v) return setTab('all');
            query = v;
            document.getElementById('tab-user').innerText = 'TARGET: ' + v.toUpperCase();
            document.getElementById('tab-user').style.display = 'block';
            setTab('user');
        }

        function render() {
            const container = document.getElementById('terminal');
            container.innerHTML = '';

            const filtered = logs.filter(i => {
                if(!i) return false;
                if(tab === 'report') return i.type === 'REPORT';
                if(tab === 'user') {
                    const u = (i.user || i.target || '').toLowerCase();
                    const s = (i.sender || '').toLowerCase();
                    return u.includes(query) || s.includes(query);
                }
                return true;
            });

            if(filtered.length === 0) {
                container.innerHTML = '<div class="log-line">NO RECORDS FOUND</div>';
                return;
            }

            filtered.forEach(i => {
                const div = document.createElement('div');
                div.className = 'log-line';
                
                const time = i.ts ? new Date(i.ts * 1000).toLocaleString('ru-RU') : '??:??:??';
                const color = i.color || '#00ff41';
                const type = (i.type || 'LOG').toUpperCase();

                let html = `<span class="ts">[${time}]</span>`;
                html += `<span class="type" style="color:${color}">[${type}]</span>`;
                
                if(type === 'REPORT') {
                    html += `<span class="user">${i.sender}</span> reported <span style="color:#ff4444">${i.user || i.target}</span> :: <span class="details">"${i.reason}"</span>`;
                } else {
                    html += `<span class="user">${i.user}</span> :: <span class="details">${i.action || ''} ${i.details || ''}</span>`;
                }

                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        setInterval(() => {
            document.getElementById('clock').innerText = 'SYS_TIME: ' + new Date().toLocaleTimeString();
        }, 1000);

        setInterval(load, 30000);
        window.onload = load;
    </script>
</body>
</html>
