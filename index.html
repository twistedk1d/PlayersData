<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Casual Style | PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: 0.4s; }
        .theme-dark { background: #0f1115; color: #e2e8f0; }
        .theme-light { background: #f3f4f6; color: #1f2937; }
        .ui-card { backdrop-filter: blur(10px); border: 1px solid rgba(128,128,128,0.1); }
        .theme-dark .ui-card { background: rgba(22, 27, 34, 0.6); }
        .theme-light .ui-card { background: rgba(255, 255, 255, 0.8); shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-btn { padding: 8px 20px; border-radius: 10px; font-weight: 700; opacity: 0.5; transition: 0.2s; }
        .tab-btn.active { opacity: 1; background: #22c55e; color: white; }
        .log-row { border-left: 4px solid #3b82f6; }
        .log-report { border-left-color: #ef4444; }
    </style>
</head>
<body class="p-4 md:p-10 theme-dark">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">Casual <span class="text-green-500">Style</span></h1>
                <p id="theme-status" class="text-[10px] font-bold opacity-50 mt-1 uppercase tracking-widest"></p>
            </div>
            <div id="clock" class="text-xs font-mono opacity-50"></div>
        </header>

        <div class="ui-card rounded-2xl p-3 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-1">
                <button onclick="setTab('all')" id="tab-all" class="tab-btn active">СОБЫТИЯ</button>
                <button onclick="setTab('report')" id="tab-report" class="tab-btn">ЖАЛОБЫ</button>
                <button onclick="setTab('user')" id="tab-user" class="tab-btn hidden"></button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="search" placeholder="Никнейм игрока..." class="w-full bg-black/10 border border-white/5 rounded-xl px-4 py-3 text-sm outline-none focus:border-green-500 transition-all">
                <button onclick="searchPlayer()" class="absolute right-2 top-2 bg-green-500 text-white text-[10px] px-4 py-2 rounded-lg font-black">ПОИСК</button>
            </div>
        </div>

        <div id="logs-container" class="space-y-2"></div>
    </div>

    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/twistedk1d/PlayersData/refs/heads/main/data.json';
        let allData = [];
        let currentTab = 'all';
        let currentUser = '';

        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 20 || hour < 7;
            document.body.className = isNight ? 'p-4 md:p-10 theme-dark' : 'p-4 md:p-10 theme-light';
            document.getElementById('theme-status').innerText = isNight ? '🌙 Ночной мониторинг' : '☀️ Дневной режим';
        }

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (t === 'user' ? 'user' : t)).classList.add('active');
            if (t !== 'user') {
                document.getElementById('tab-user').classList.add('hidden');
                currentUser = '';
            }
            render();
        }

        async function load() {
            try {
                const r = await fetch(`${DATA_URL}?v=${Date.now()}`);
                const data = await r.json();
                allData = Array.isArray(data) ? data.filter(i => i !== null) : [];
                render();
            } catch (e) { console.error("Data error"); }
        }

        function searchPlayer() {
            const val = document.getElementById('search').value.toLowerCase().trim();
            if (!val) return;
            currentUser = val;
            const btn = document.getElementById('tab-user');
            btn.innerText = `ИГРОК: ${val.toUpperCase()}`;
            btn.classList.remove('hidden');
            setTab('user');
        }

        function render() {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';

            const filtered = allData.filter(item => {
                if (currentTab === 'report') return item.type === 'report';
                if (currentTab === 'user') {
                    const u = (item.user || item.target || '').toLowerCase();
                    const s = (item.sender || '').toLowerCase();
                    return u.includes(currentUser) || s.includes(currentUser);
                }
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 font-bold italic">НЕТ ДАННЫХ</div>';
                return;
            }

            filtered.forEach(item => {
                const date = item.ts ? new Date(item.ts * 1000).toLocaleString() : (item.fullTime || '---');
                const div = document.createElement('div');
                div.className = `ui-card p-4 rounded-xl flex justify-between items-center log-row ${item.type === 'report' ? 'log-report' : ''}`;
                
                let main = item.type === 'report' 
                    ? `<div><span class="text-red-500 font-black text-[10px] mr-2">REPORT</span><b>${item.sender}</b> → <b class="text-red-500">${item.user || item.target}</b><br><span class="text-xs opacity-60">${item.reason}</span></div>`
                    : `<div><span class="text-blue-500 font-black text-[10px] mr-2 uppercase">${item.type}</span><b>${item.user}</b> <span class="opacity-50 ml-1">— ${item.action || ''}</span><br><span class="text-[10px] opacity-40 font-mono">${item.details || ''}</span></div>`;

                div.innerHTML = `${main}<div class="text-[10px] font-mono opacity-30 font-bold">${date}</div>`;
                container.appendChild(div);
            });
        }

        updateTheme();
        setInterval(updateTheme, 60000);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
        setInterval(load, 15000);
        window.onload = load;
    </script>
</body>
</html>
