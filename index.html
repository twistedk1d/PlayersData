<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Casual Style | LOGS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f2328;
            --card: #f6f8fa;
            --border: #d0d7de;
            --accent: #2ecc71;
            --report: #ff4d4d;
        }

        body.dark {
            --bg: #0d1117;
            --text: #c9d1d9;
            --card: #161b22;
            --border: #30363d;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 800px; margin: auto; }

        .header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px; 
        }

        .header h1 { 
            margin: 0; 
            font-size: 22px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .nav-bar { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 20px; 
        }

        .tab-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .search-area { 
            margin-bottom: 20px; 
            display: flex; 
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            outline: none;
        }

        .log-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
            opacity: 0.7;
        }

        .log-body { font-size: 14px; line-height: 1.4; }
        .user-name { font-weight: 700; color: var(--accent); }
        .report-user { color: var(--report); font-weight: 700; }
        
        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            margin-right: 8px;
            color: #fff;
            text-transform: uppercase;
        }

        .player-row {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 4px;
            background: var(--card);
        }
        .player-row:hover { background: var(--accent); color: #fff; }

    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ЛОГИ <span id="clock" style="opacity:0.5; font-size:14px; font-weight:normal;"></span></h1>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i id="theme-icon" data-lucide="monitor"></i>
            <span id="theme-text">Auto</span>
        </button>
    </div>

    <div class="nav-bar">
        <button onclick="setTab('all')" id="btn-all" class="tab-btn active">EVENTS</button>
        <button onclick="setTab('report')" id="btn-report" class="tab-btn">REPORTS</button>
        <button onclick="setTab('players')" id="btn-players" class="tab-btn">PLAYERS</button>
    </div>

    <div class="search-area">
        <input type="text" id="search" class="search-input" placeholder="Поиск игрока..." oninput="render()">
    </div>

    <div id="content"></div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/twistedk1d/PlayersData/refs/heads/main/data.json';
let logs = [];
let currentTab = 'all';
let themeMode = localStorage.getItem('themeMode') || 'auto';

function updateTheme() {
    const hour = new Date().getHours();
    const isDarkTime = hour >= 20 || hour < 8;
    const icon = document.getElementById('theme-icon');
    const text = document.getElementById('theme-text');

    if (themeMode === 'auto') {
        if (isDarkTime) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        icon.setAttribute('data-lucide', 'monitor');
        text.innerText = 'Auto';
    } else if (themeMode === 'dark') {
        document.body.classList.add('dark');
        icon.setAttribute('data-lucide', 'moon');
        text.innerText = 'Dark';
    } else {
        document.body.classList.remove('dark');
        icon.setAttribute('data-lucide', 'sun');
        text.innerText = 'Light';
    }
    lucide.createIcons();
}

function toggleTheme() {
    if (themeMode === 'auto') themeMode = 'light';
    else if (themeMode === 'light') themeMode = 'dark';
    else themeMode = 'auto';
    
    localStorage.setItem('themeMode', themeMode);
    updateTheme();
}

async function load() {
    try {
        const r = await fetch(DATA_URL + '?v=' + Date.now());
        const rawData = await r.json();
        logs = Array.isArray(rawData) ? rawData : [];
        render();
    } catch(e) { 
        console.error("Ошибка загрузки:", e); 
    }
}

function setTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + t).classList.add('active');
    render();
}

function render() {
    const container = document.getElementById('content');
    const searchTerm = document.getElementById('search').value.toLowerCase();
    container.innerHTML = '';

    if (currentTab === 'players') {
        const players = new Set();
        logs.forEach(l => {
            if(l.user) players.add(l.user);
            if(l.sender) players.add(l.sender);
        });
        
        Array.from(players).filter(p => p.toLowerCase().includes(searchTerm)).forEach(p => {
            const div = document.createElement('div');
            div.className = 'player-row';
            div.innerText = '👤 ' + p;
            div.onclick = () => {
                document.getElementById('search').value = p;
                setTab('all');
            };
            container.appendChild(div);
        });
        return;
    }

    const filtered = logs.filter(l => {
        const typeStr = (l.type || '').toUpperCase();
        const nameMatch = (l.user || '').toLowerCase().includes(searchTerm) || 
                          (l.sender || '').toLowerCase().includes(searchTerm);
        
        const isReport = typeStr === 'REPORT' || typeStr === 'РЕПОРТ';
        
        if (currentTab === 'report') return isReport && nameMatch;
        return nameMatch;
    });

    filtered.forEach(l => {
        const div = document.createElement('div');
        div.className = 'log-card';
        
        const date = l.ts ? new Date(l.ts * 1000).toLocaleString() : '---';
        const color = l.color || '#2ecc71';
        const type = (l.type || 'LOG').toUpperCase();
        const isReport = type === 'REPORT' || type === 'РЕПОРТ';

        let bodyHtml = '';
        if(isReport) {
            bodyHtml = `<span class="user-name">${l.sender || 'Unknown'}</span> подал жалобу на <span class="report-user">${l.user || 'Unknown'}</span><br>
                        <span style="opacity:0.9; font-weight: 600;">Причина: ${l.reason || 'не указана'}</span>`;
        } else {
            const actionText = l.action ? ` — ${l.action}` : '';
            bodyHtml = `<span class="user-name">${l.user || l.sender || 'System'}</span>${actionText} <span style="opacity:0.8">${l.details || l.reason || ''}</span>`;
        }

        div.innerHTML = `
            <div class="log-header">
                <span><span class="tag" style="background:${color}">${type}</span> ${date}</span>
            </div>
            <div class="log-body">${bodyHtml}</div>
        `;
        container.appendChild(div);
    });
}

setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
}, 1000);

updateTheme();
load();
setInterval(load, 15000);
</script>
</body>
</html>
