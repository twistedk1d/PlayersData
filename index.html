<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Casual Style | PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f1115; color: #e2e8f0; transition: 0.3s; }
        .ui-card { background: rgba(22, 27, 34, 0.6); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .tab-btn { padding: 8px 20px; border-radius: 12px; font-weight: 600; font-size: 14px; transition: 0.2s; opacity: 0.5; }
        .tab-btn.active { opacity: 1; background: #22c55e; color: white; }
        .log-row { border-left: 4px solid #3b82f6; }
        .log-report { border-left-color: #ef4444; }
        .log-universal { border-left-color: #a855f7; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-extrabold uppercase tracking-widest">Casual <span class="text-green-500">Style</span></h1>
            <div id="clock" class="text-xs font-mono opacity-50"></div>
        </header>

        <div class="ui-card rounded-2xl p-4 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-2" id="tabs">
                <button onclick="setTab('all')" class="tab-btn active" id="tab-all">События</button>
                <button onclick="setTab('report')" class="tab-btn" id="tab-report">Жалобы</button>
                <button onclick="setTab('user')" class="tab-btn hidden" id="tab-user">История игрока</button>
            </div>
            <div class="relative w-full md:w-72">
                <input type="text" id="search" placeholder="Ник игрока..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-sm outline-none focus:border-green-500 transition-all">
                <button onclick="searchPlayer()" class="absolute right-2 top-1.5 bg-green-500 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold">ПОИСК</button>
            </div>
        </div>

        <div id="logs-container" class="space-y-3"></div>
    </div>

    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/twistedk1d/PlayersData/refs/heads/main/data.json';
        let allData = [];
        let currentTab = 'all';
        let currentUser = '';

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (t === 'user' ? 'user' : t)).classList.add('active');
            if (t !== 'user') {
                document.getElementById('tab-user').classList.add('hidden');
                currentUser = '';
            }
            render();
        }

        async function load() {
            try {
                const r = await fetch(`${DATA_URL}?v=${Date.now()}`);
                allData = await r.json();
                render();
            } catch (e) { console.error("Load error"); }
        }

        function searchPlayer() {
            const val = document.getElementById('search').value.toLowerCase();
            if (!val) return;
            currentUser = val;
            document.getElementById('tab-user').innerText = `Игрок: ${val}`;
            document.getElementById('tab-user').classList.remove('hidden');
            setTab('user');
        }

        function render() {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';

            const filtered = allData.filter(item => {
                if (currentTab === 'report') return item.type === 'report';
                if (currentTab === 'user') {
                    const u = (item.user || '').toLowerCase();
                    const s = (item.sender || '').toLowerCase();
                    const t = (item.target || '').toLowerCase();
                    return u.includes(currentUser) || s.includes(currentUser) || t.includes(currentUser);
                }
                return true; 
            });

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = `ui-card p-4 rounded-xl flex justify-between items-center log-row ${item.type === 'report' ? 'log-report' : (item.type !== 'log' ? 'log-universal' : '')}`;
                
                let content = '';
                if (item.type === 'report') {
                    content = `<div><span class="text-red-400 font-bold">REPORT</span> <span class="mx-2 opacity-30">|</span> <b>${item.sender}</b> → <b class="text-red-400">${item.user}</b></div>
                               <div class="text-xs bg-red-500/10 px-3 py-1 rounded-lg border border-red-500/20">${item.reason}</div>`;
                } else {
                    content = `<div><span class="text-blue-400 font-bold uppercase">${item.type}</span> <span class="mx-2 opacity-30">|</span> <b>${item.user}</b> <span class="opacity-60 ml-2">${item.action || ''}</span></div>
                               <div class="text-[10px] opacity-40 font-mono">${item.details || ''}</div>`;
                }

                div.innerHTML = `
                    <div class="flex flex-col gap-1">${content}</div>
                    <div class="text-right"><div class="text-[10px] font-bold opacity-30">${item.fullTime || '---'}</div></div>
                `;
                container.appendChild(div);
            });
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
        setInterval(load, 10000);
        window.onload = load;
    </script>
</body>
</html>
